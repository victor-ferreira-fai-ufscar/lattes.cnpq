services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lattes-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    env_file:
      - .env.docker
    command: uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - lattes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lattes-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    env_file:
      - .env.docker
    command: pnpm run dev --hostname 0.0.0.0 --port 3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lattes-network

networks:
  lattes-network:
    driver: bridge
