services:
  backend:
    volumes:
      # Bind mount apenas do código-fonte do backend para hot-reload rápido
      - ./backend/src:/app/src
    # Uvicorn em modo reload para refletir alterações sem reiniciar container
    command: uv run uvicorn src.api.main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8000} --reload

  frontend:
    build:
      target: dev
    volumes:
      # Bind mount do projeto frontend para hot-reload completo
      - ./frontend:/app
      # Volumes nomeados evitam reinstalações e ficam mais previsíveis entre recriações
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - CI=true
    # Next em modo dev ouvindo em todas as interfaces
    command: sh /app/scripts/dev-entrypoint.sh

volumes:
  frontend_node_modules:
  frontend_next_cache: